version: "3.9"

services:
  waha:
    image: devlikeapro/waha
    container_name: deeplook-waha
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WHATSAPP_DEFAULT_ENGINE=NOWEB
      - WHATSAPP_RESTART_ALL_SESSIONS=true
    volumes:
      - ./waha-sessions:/app/.sessions

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    depends_on:
      - waha

  # Self-hosted Metabase for platform analytics — points at Supabase via the
  # direct connection URL (the transaction-mode pooler breaks Metabase's
  # long-lived JDBC connections). Dashboards/questions are stored in the
  # embedded H2 db kept in the metabase-data volume so they survive restarts.
  metabase:
    image: metabase/metabase:latest
    container_name: deeplook-metabase
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - MB_DB_TYPE=h2
      - MB_DB_FILE=/metabase-data/metabase.db
      - MB_SITE_LOCALE=es
      - JAVA_TIMEZONE=America/Bogota
    volumes:
      - metabase-data:/metabase-data

volumes:
  metabase-data:
